<div class="login-wrapper d-flex align-items-center justify-content-center vh-100 bg-light">
  <div class="card shadow-sm p-4" style="width: 380px;">
    <div class="text-center mb-4">
      <h4 class="fw-bold">EvalCoach</h4>
      <p class="text-muted small">Ingresa tus credenciales</p>
    </div>

    @if (error()) {
      <div class="alert alert-danger alert-sm py-2">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input
          type="email"
          class="form-control"
          formControlName="email"
          placeholder="correo@ejemplo.com"
        />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <small class="text-danger">Ingresa un correo válido</small>
        }
      </div>

      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <input
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="••••••••"
        />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <small class="text-danger">La contraseña es requerida</small>
        }
      </div>

      <button
        type="submit"
        class="btn btn-primary w-100"
        [disabled]="form.invalid || loading()"
      >
        @if (loading()) {
          <span class="spinner-border spinner-border-sm me-2"></span>
        }
        Ingresar
      </button>
    </form>
  </div>
</div>
