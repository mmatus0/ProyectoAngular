<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h4 class="mb-0">Bienvenido, {{ user()?.nombre ?? user()?.email }}</h4>
    <small class="text-muted">Panel de control</small>
  </div>
</div>

<div class="row g-3">

  <!-- Usuarios -->
  <div class="col-md-3">
    <div class="dash-card dash-card--teal">
      <div class="dash-card__icon">
        <i class="bi bi-people-fill"></i>
      </div>
      <h6 class="dash-card__title">Usuarios</h6>
      <p class="dash-card__value">—</p>
    </div>
  </div>

  <!-- Evaluaciones -->
  <div class="col-md-3">
    <div class="dash-card dash-card--violet">
      <div class="dash-card__icon">
        <i class="bi bi-clipboard2-check-fill"></i>
      </div>
      <h6 class="dash-card__title">Evaluaciones</h6>
      <p class="dash-card__value">—</p>
    </div>
  </div>

  <!-- Sesiones -->
  <div class="col-md-3">
    <div class="dash-card dash-card--blue">
      <div class="dash-card__icon">
        <i class="bi bi-calendar2-event-fill"></i>
      </div>
      <h6 class="dash-card__title">Sesiones</h6>
      <p class="dash-card__value">—</p>
    </div>
  </div>

  <!-- Herramientas -->
  <div class="col-md-3">
    <div class="dash-card dash-card--sky">
      <div class="dash-card__icon">
        <i class="bi bi-tools"></i>
      </div>
      <h6 class="dash-card__title">Herramientas</h6>
      <p class="dash-card__value">—</p>
    </div>
  </div>

</div>
